# 出差发票自动整理系统 - 主配置文件

# 百度网盘配置（bypy）
baidu_pan:
  # 远程目录（相对于 /apps/bypy/）
  remote_dir: "invoices"
  # 本地临时下载目录
  temp_dir: "temp"
  # 下载后自动处理
  process_after_download: true

# 本地整理目录（输出）
local_output_dir: "invoices"

# 默认出差人
default_traveler: "王春晖"

# 处理选项
options:
  # 处理后删除临时文件
  delete_temp_after_process: true
  # 跳过已处理的文件
  skip_existing: true
  # 模拟运行（不实际移动文件）
  dry_run: false

# OCR 配置
ocr:
  # PaddleOCR 模型选择
  use_angle_cls: true  # 是否使用方向分类器
  lang: "ch"           # 语言：ch(中英文混合)
  # GPU 加速（如果有 GPU）
  use_gpu: false
  # 置信度阈值
  confidence_threshold: 0.6

# 调度配置
scheduler:
  # 每日执行时间
  daily_hour: 2
  daily_minute: 0
  # 任务超时时间（秒）
  timeout: 3600

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  # 日志文件路径
  file: "logs/invoice_organizer.log"
  # 日志保留天数
  retention_days: 30
  # 单个日志文件大小限制（MB）
  max_size_mb: 100
