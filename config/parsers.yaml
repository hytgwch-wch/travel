# 出差发票自动整理系统 - 发票解析规则配置

# ============================================
# 发票类型检测规则
# ============================================
type_detection:
  airplane:
    keywords:
      - "航空运输电子客票行程单"
      - "客票行程单"
      - "航空"
      - "航班号"
      - "燃油附加费"
      - "代订机票"
      - "机票"
      - "经济舱"
      - "携程订单"
      - "公务舱"
      - "头等舱"
      - "*经纪代理服务*代订机票"
    priority: 10

  airport_transfer:
    keywords:
      - "用车行程单"
      - "送机"
      - "接机"
      - "送站"
      - "接站"
    priority: 9

  train:
    keywords:
      - "中国铁路"
      - "12306"
      - "车次"
      - "座位号"
      - "站到站"
      - "铁路客运"
    priority: 8

  taxi:
    keywords:
      - "出租车"
      - "网约车"
      - "滴滴出行"
      - "里程费"
      - "等候费"
      - "打车"
      - "客运服务"
      - "旅客运输"
      - "运输服务*客运"
      - "出行"
      - "海豚"
      - "神州"
      - "首汽"
      - "曹操"
    priority: 7

  hotel:
    keywords:
      - "住宿费"
      - "住宿服务"
      - "酒店"
      - "宾馆"
      - "民宿"
      - "房费"
      - "住宿"
    priority: 6

  dining:
    keywords:
      - "餐饮"
      - "餐费"
      - "食品"
      - "餐饮服务"
      - "就餐"
    priority: 5

  car_rental:
    keywords:
      - "汽车租赁"
      - "租车费"
      - "租赁服务"
      - "车辆租赁"
    priority: 4

# ============================================
# 字段提取规则（正则表达式）
# ============================================
field_extraction:

  # 日期提取（按优先级尝试）- 优先提取实际出行日期
  date:
    # 住宿发票的入住日期（优先级最高）
    - pattern: '入住日期[：:]\s*(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 15
    # 住宿日期格式: 住宿日期 2026年03月11日
    - pattern: '住宿日期[：:]\s*(\d{4})年(\d{1,2})月(\d{1,2})日'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 14
    # 火车票乘车日期：格式如 2026年03月11日 (在车次号之前)
    # 排除开票日期的匹配
    - pattern: '[A-Z]{1,2}\d+\s*\n\s*(\d{4})年(\d{1,2})月(\d{1,2})日'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 13
    # 火车票乘车日期：格式如 2026年03月11日 (跟在日期后面)
    - pattern: '\n\s*(\d{4})年(\d{1,2})月(\d{1,2})日\s*[\u4e00-\u9fa5]{0,10}\s*[0-9:]+'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 12
    # 机票航班日期：格式如 2026/2/10 杭州-青岛
    - pattern: '(\d{4})[/\-](\d{1,2})[/\-](\d{1,2})\s+[\u4e00-\u9fa5]+[-\-→][\u4e00-\u9fa5]+\s+[A-Z]{2}\d+'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 11
    # 行程单中的行程日期
    - pattern: '行程日期[：:]\s*(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 10
    # 用车时间
    - pattern: '用车时间[：:]\s*(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})\s+\d{2}:\d{2}:\d{2}'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 9
    # 携程订单日期: 携程订单:xxx,2026/2/10 ...
    - pattern: '携程订单[：:,]\s*\d+[,，]\s*(\d{4})[//-](\d{1,2})[/\-](\d{1,2})'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 8
    # 通用日期格式 (优先级降低，避免匹配到开票日期)
    - pattern: '(\d{4})(\d{2})(\d{2})'
      format: "{1}-{2}-{3}"
      priority: 2
    - pattern: '(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 1
    # 开票日期 (最低优先级，仅作为备选)
    - pattern: '开票日期[：:]\s*(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})'
      format: "{1}-{2:0>2}-{3:0>2}"
      priority: 0

  # 退票费检测
  is_refund:
    - pattern: '退票费'
    - pattern: '退票手续费'
    - pattern: '退票更改费'
    - pattern: '退改费'

  # 金额提取
  amount:
    # 价税合计 - 中文大写圆整后跟¥和数字（最高优先级）
    # 如：壹佰叁拾叁圆整 ¥ 133.00（使用[\s\S]*?匹配换行符）
    # 支持正式大写数字：壹贰叁肆伍陆柒捌玖拾佰仟万和普通数字：一二三四五六七八九十百千
    - pattern: '[壹贰叁肆伍陆柒捌玖拾佰仟万一二三四五六七八九十百千]+圆整[\s\S]*?[￥¥]\s*(\d+\.\d{2})'
    # 价税合计 - 中文大写圆整后的数字（可能有其他¥符号在前面）
    - pattern: '[壹贰叁肆伍陆柒捌玖拾佰仟万一二三四五六七八九十百千]+圆整[\s\S]*?(\d+\.\d{2})'
    # 价税合计 - （小写）后的数字（最多100字符内的第一个数字）
    - pattern: '（小写）[\s\S]{0,100}?(\d+\.\d{2})(?!\d)'
    # 价税合计 - （小写）格式：¥后跟数字
    - pattern: '价税合计[\s\S]*?（小写）[\s\S]*?[￥¥]\s*(\d+\.\d{2})'
    # 价税合计 - ¥后跟数字（但排除明显的税额）
    - pattern: '价税合计[\s\S]*?[￥¥]\s*(\d{1,4}\.\d{2})(?!\d)'
    # 其他中文大写格式
    - pattern: '壹佰[\s\S]*?圆整[\s\S]*?(\d+\.\d{2})'
    - pattern: '肆拾[\s\S]*?圆[\s\S]*?角[\s\S]*?分'
    # 合计金额
    - pattern: '合计金额[：:]\s*[￥¥]?\s*(\d+\.\d{2})'
    # 行程总计
    - pattern: '行程总计[：:]\s*.*?(\d+\.\d{2})\s*元'
    # 一般的¥符号 + 数字（作为备选）
    - pattern: '[￥¥]\s*(\d+\.\d{2})'
    # 一般的数字+元（作为备选）
    - pattern: '(\d+\.\d{2})\s*元'

  # 机票航线提取 - 从携程订单格式
  airplane_route:
    - pattern: '携程订单[：:,]\s*\d+[,，]\s*\d{4}[/\-]\d{1,2}[/\-]\d{1,2}\s+([\u4e00-\u9fa5]+)[-\-→]+([\u4e00-\u9fa5]+)\s+[A-Z]{2}\d+'
    - pattern: '([\u4e00-\u9fa5]{2,3})[-\-→]+([\u4e00-\u9fa5]{2,3})\s+[A-Z]{2}\d+'
    - pattern: '([\u4e00-\u9fa5]+)\s*至\s*([\u4e00-\u9fa5]+)'

  # 火车票路线提取 - 优先中文站名
  train_route:
    # 优先：纯中文站名（带站字） - 杭州西站...上海虹桥站
    - pattern: '([\u4e00-\u9fa5]{2,5}站)[\s\S]{0,300}?([\u4e00-\u9fa5]{2,5}站)'
    # 纯中文站名（不带站字） - 南京南...丽水
    - pattern: '([\u4e00-\u9fa5]{2,4}[南东站]?)[\s\S]{0,300}?([\u4e00-\u9fa5]{2,4}[南东站]?)[^站\u4e00-\u9fa5]'
    # 同行中文站名加车次 - 南京南 丽水 G823
    - pattern: '([\u4e00-\u9fa5]{2,4}[南东站西]?)\s+([\u4e00-\u9fa5]{2,4}[南东站西]?)\s+[A-Z]{1,2}\d+'
    # 站名对格式: 南京南 丽水站
    - pattern: '([\u4e00-\u9fa5]{2,4}[南东西北]?站?)\s+([\u4e00-\u9fa5]{2,4}[南东西北]?站?)'
    # 南京南站到丽水站
    - pattern: '([\u4e00-\u9fa5]{2,5}[站])\s*到\s*([\u4e00-\u9fa5]{2,5}[站])'
    # (\w+)站.*到.*(\w+)站 (跨行)
    - pattern: '(\w+)站[\s\S]*?到[\s\S]*?(\w+)站'
    # (\w+)\s*→\s*(\w+)\s*(G|D|K|T|Z)\d+
    - pattern: '(\w+)\s*→\s*(\w+)\s*(G|D|K|T|Z)\d+'
    # 英文站名（最后尝试，作为备选） - Shanghaihongqiao ... Hangzhouxi
    # 注意：英文站名在12306票据上的顺序是 Origin -> Destination
    - pattern: '([A-Z][a-z]+)[\s\S]+?([A-Z][a-z]+)'

  # 接送机路线提取 - 从行程单
  # 表格格式: 起点/终点是表头，实际值在数据行中
  # 通过查找时间行后的位置信息来提取
  airport_transfer_route:
    - pattern: '\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\s*\n\s*(.+?)\s*\n\s*(.+?)\s*\n\s*\d+\.\d{2}'

  # 打车路线提取
  taxi_route:
    - pattern: '上车地点[：:]\s*(.+?)\s*(?:下车地点|终点)[：:]\s*(.+)'
    - pattern: '起点[：:]\s*(.+?)\s*终点[：:]\s*(.+)'

  # 住宿信息提取
  hotel_info:
    - pattern: '酒店名称[：:]\s*(.+)'
    - pattern: '销售方名称[：:]\s*(.+?)(?:\n|$)'
    - pattern: '住宿地点[：:]\s*(\w+市?|\w+区?)'
    - pattern: '([\u4e00-\u9fa5]{2,4})市.*?酒店'
    - pattern: '([\u4e00-\u9fa5]{2,4})[\u4e00-\u9fa5]{2,4}国际旅行社.*?代订住宿'
    # Extract city from booking company name: 上海赫程国际旅行社 -> 上海
    - pattern: '([\u4e00-\u9fa5]{2,4})[\u4e00-\u9fa5\u4e00-\u9fa5]+国际旅行社'

  # 住宿日期范围提取（入住日期-退房日期）
  hotel_stay_dates:
    # 格式: 入住日期:2026年03月11日  退房日期:2026年03月12日
    - pattern: '入住日期[：:]\s*(\d{4})年(\d{1,2})月(\d{1,2})日.*?退房日期[：:]\s*(\d{4})年(\d{1,2})月(\d{1,2})日'
    # 格式: 入住日期 2026-02-24 离开日期 2026-02-25 (结账单格式，支持换行)
    - pattern: '入住日期.*?(\d{4})-(\d{1,2})-(\d{1,2}).*?离开日期.*?(\d{4})-(\d{1,2})-(\d{1,2})'
    # 格式: 2026.03.11-2026.03.12
    - pattern: '(\d{4})\.(\d{1,2})\.(\d{1,2})\s*[-\-~到至]\s*(\d{4})\.(\d{1,2})\.(\d{1,2})'
    # 格式: 2026-03-11至2026-03-12
    - pattern: '(\d{4})[-/](\d{1,2})[-/](\d{1,2})\s*[-\-~到至]\s*(\d{4})[-/](\d{1,2})[-/](\d{1,2})'

  # 入住天数提取
  stay_days:
    - pattern: '住宿(\d+)天'
    - pattern: '入住(\d+)晚'
    - pattern: '(\d+)天.*房费'
    - pattern: '共住宿(\d+)晚'

  # 出差人姓名提取 - 按优先级
  traveler:
    # 携程订单格式: 携程订单:xxx,2026/2/10 杭州-青岛 GJ8309 徐洋
    - pattern: '携程订单[：:,]\s*\d+[,，]\s*\d{4}[/\-]\d{1,2}[/\-]\d{1,2}\s+[\u4e00-\u9fa5]+[-\-→]+[\u4e00-\u9fa5]+\s+[A-Z]{2}\d+\s+([\u4e00-\u9fa5]{2,4})'
      priority: 10
    # 行程单: 行程人手机号后面可能跟姓名
    - pattern: '行程人[：:]\s*([\u4e00-\u9fa5]{2,4})'
      priority: 9
    # 乘机人
    - pattern: '乘机人[：:]\s*([\u4e00-\u9fa5]{2,4})'
      priority: 8
    # 旅客姓名
    - pattern: '旅客姓名[：:]\s*([\u4e00-\u9fa5]{2,4})'
      priority: 7
    # 购票人
    - pattern: '购票人[：:]\s*([\u4e00-\u9fa5]{2,4})'
      priority: 6
    # 出行人
    - pattern: '出行人[：:]\s*[\r\n]+([\u4e00-\u9fa5]{2,4})'
      priority: 5
    # 姓名字段
    - pattern: '姓名[：:]\s*([\u4e00-\u9fa5]{2,4})'
      priority: 4

# ============================================
# 发票类型命名模板
# ============================================
naming_templates:
  airplane: "{date}_机票_{origin}_{destination}_{amount}_{traveler}"
  airplane_refund: "{date}_机票_{origin}_{destination}_{amount}_{traveler}_退票费"
  airport_transfer: "{date}_接送机_{origin}_{destination}_{amount}_{traveler}_行程单"
  train: "{date}_火车_{origin}_{destination}_{amount}_{traveler}"
  train_refund: "{date}_火车_{origin}_{destination}_{amount}_{traveler}_退票费"
  taxi: "{date}_打车_{origin}_{destination}_{amount}_{traveler}"
  hotel: "{check_in_date}_住宿_{city}_{stay_date_range}_{amount}_{traveler}"
  hotel_simple: "{date}_住宿_{city}_{amount}_{traveler}"
  dining: "{date}_餐饮_{city}_{amount}_{traveler}"
  car_rental: "{date}_租车_{city}_{days}天_{amount}_{traveler}"
  other: "{date}_其他_{type}_{amount}_{traveler}"

# ============================================
# 默认值配置
# ============================================
defaults:
  # 无法识别出差人时使用的默认值
  traveler_default: "张三"
  # 无法识别城市时使用的默认值
  city_default: "未知"
  # 无法识别发票类型时的分类
  other_type_dir: "其他"
